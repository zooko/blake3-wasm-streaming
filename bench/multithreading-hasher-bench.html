<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>BLAKE3 WASM — multithreading-hasher benchmark</title>
    <style>
     body {
       font-family: "Courier New", monospace;
       background: #f7f8fb;
       color: #1f2937;
       padding: 20px;
       margin: 0;
       width: max-content;
       min-width: calc(100vw - 40px);
     }
     h1, h2 { color: #1d4ed8; }
     p { line-height: 1.35; }
     button {
       font-size: 16px;
       padding: 8px 20px;
       margin: 5px 5px 5px 0;
       cursor: pointer;
     }
     button:disabled { opacity: 0.4; cursor: default; }
     table {
       border-collapse: collapse;
       margin: 10px 0;
       background: #fff;
     }
     th, td {
       border: 1px solid #d1d5db;
       padding: 4px 10px;
       text-align: right;
       vertical-align: top;
       font-family: monospace;
     }
     th { background: #e0e7ff; color: #1e3a8a; }
     td:first-child, th:first-child { text-align: left; }
     #status { font-weight: bold; margin: 10px 0; }
     #config { margin: 10px 0 16px; color: #374151; }
     #log {
       white-space: pre-wrap;
       font-size: 12px;
       color: #374151;
       margin-top: 20px;
       max-height: 500px;
       overflow-y: auto;
       background: #ffffff;
       padding: 10px;
       border: 1px solid #d1d5db;
     }
     .cell-win { background-color: #dcfce7; color: #166534; }
     .cell-lose { background-color: #fee2e2; color: #b91c1c; }
     .dim { color: #6b7280; font-size: 0.85em; }
     .err { color: #b91c1c; font-weight: bold; }
     .tables-grid {
       display: flex;
       flex-direction: column;
       gap: 16px;
       align-items: flex-start;
     }
     .slice-panel {
       background: #fff;
       border: 1px solid #d1d5db;
       border-radius: 8px;
       padding: 10px;
       box-shadow: 0 1px 2px rgba(0,0,0,0.04);
       overflow: visible;
       width: max-content;
       min-width: 0;
     }
     .slice-panel table {
       width: max-content;
       min-width: 0;
       margin: 0;
     }
    </style>
  </head>
  <body>
    <h1>BLAKE3 WASM — multithreading-hasher benchmark</h1>
    <p>
      Benchmarks <code>multithreading-hasher.js</code> with
      fixed 16 KiB slice size.
    </p>
    <div id="config"></div>
    <button id="btn-run" onclick="window.runBenchmarks(false)">
      Run Benchmarks
    </button>
    <button id="btn-quick" onclick="window.runBenchmarks(true)">
      Quick Run
    </button>
    <div id="status"></div>

    <h2>Main-Thread Benchmarks — BLAKE3 1T vs WebCrypto SHA-256</h2>
    <div id="main-results"></div>

    <h2>Thread Sweep — fixed 16 KiB slices</h2>
    <div id="manual-results"></div>

    <h2>Auto Thread Count — hashParallelBytes default</h2>
    <div id="planner-results"></div>

    <pre id="log"></pre>

    <script type="module">
     import initHasher from "../multithreading-hasher.js";

     const SLICE_SIZE = 16384;

     const DATA_SIZES = [
       64,
       1536,
       16385,
       64 * 1024 - 1,
       64 * 1024,
       64 * 1024 + 1,
       96 * 1024,
       128 * 1024 - 1,
       128 * 1024,
       128 * 1024 + 1,
       200000,
       230000,
       262208,
       290000,
       300000,
       330000,
       336000,
       384 * 1024,
       2000000,
     ];

     const VERIFY_SIZES = [
       64,
       16385,
       160 * 1024,
       262208,
       384 * 1024,
       2000000,
     ];

     const MEAS_FULL = 9;
     const MEAS_QUICK = 5;

     const HEX = Array.from({ length: 256 },
       (_, i) => (i + 256).toString(16).slice(1));

     function hex(bytes) {
       let s = '';
       for (let i = 0; i < bytes.length; i++)
         s += HEX[bytes[i]];
       return s;
     }

     const logEl = document.getElementById("log");
     const statusEl = document.getElementById("status");
     const configEl = document.getElementById("config");
     const mainResultsEl = document.getElementById("main-results");
     const manualResultsEl = document.getElementById("manual-results");
     const plannerResultsEl = document.getElementById("planner-results");

     let hasher;
     const logLines = [];
     const inputsByBytes = new Map();

     function assert(cond, msg) {
       if (!cond) throw new Error(msg);
     }

     function log(msg) { logLines.push(msg); }

     function flushLog() {
       logEl.textContent = logLines.join("\n");
       logEl.scrollTop = logEl.scrollHeight;
     }

     function setStatus(msg) {
       statusEl.textContent = msg;
       statusEl.className = "";
     }

     function setError(msg) {
       statusEl.textContent = msg;
       statusEl.className = "err";
     }

     function fmtMs(ms) {
       if (ms >= 1) return ms.toFixed(3) + " ms";
       if (ms >= 0.001) return (ms * 1000).toFixed(1) + " µs";
       return (ms * 1e6).toFixed(0) + " ns";
     }

     function fmtTimePerByte(ms, bytes) {
       const nsB = (ms * 1e6) / bytes;
       if (nsB >= 1000) return (nsB / 1000).toFixed(2) + " µs/B";
       if (nsB >= 1) return nsB.toFixed(2) + " ns/B";
       return (nsB * 1000).toFixed(0) + " ps/B";
     }

     function fmtSize(bytes) {
       if (bytes >= 1048576 && bytes % 1048576 === 0)
         return bytes / 1048576 + " MiB";
       if (bytes >= 1024 && bytes % 1024 === 0)
         return bytes / 1024 + " KiB";
       return bytes.toLocaleString() + " B";
     }

     function cellClass(ratio) {
       return ratio > 1.10 ? "cell-win"
         : ratio < 0.90 ? "cell-lose" : "";
     }

     function bestOf(candidates) {
       let best = candidates[0];
       for (let i = 1; i < candidates.length; i++)
         if (candidates[i].ms < best.ms) best = candidates[i];
       return best;
     }

     function canRunParallel(bytes, totalThreads) {
       return bytes >= totalThreads * SLICE_SIZE;
     }

     function makeInput(bytes) {
       const input = new Uint8Array(bytes);
       for (let i = 0; i < bytes; i++) input[i] = i;
       return input;
     }

     function getInput(bytes) {
       let input = inputsByBytes.get(bytes);
       if (input !== undefined) return input;
       input = makeInput(bytes);
       inputsByBytes.set(bytes, input);
       return input;
     }

     async function initHasherOnce() {
       if (hasher) return;
       hasher = await initHasher();
       configEl.textContent =
         "Library config: maxThreads = " +
         hasher.maxThreads +
         ", maxData = " + fmtSize(hasher.maxData);
     }

     function directDigestHex(bytes) {
       hasher.hashBytes(getInput(bytes));
       return hex(hasher.digest);
     }

     async function parallelDigestHex(bytes, threads) {
       const t = await hasher.hashParallelBytes(
         getInput(bytes), threads);
       return { hex: hex(hasher.digest), threads: t };
     }

     function hashBlake3(bytes) {
       hasher.hashBytes(getInput(bytes));
     }

     async function hashSha256(bytes) {
       await crypto.subtle.digest("SHA-256", getInput(bytes));
     }

     async function hashParallel(bytes, threads) {
       return hasher.hashParallelBytes(
         getInput(bytes), threads);
     }

     function calibrateSync(fn, targetMs) {
       fn(); fn(); fn();
       const probe = 5;
       const t0 = performance.now();
       for (let i = 0; i < probe; i++) fn();
       const elapsed = performance.now() - t0;
       const perIter = elapsed / probe;
       if (perIter < 0.001) return Math.ceil(targetMs / 0.020);
       return Math.max(3, Math.ceil(targetMs / perIter));
     }

     function measureSync(fn, numM, targetMs) {
       const iters = calibrateSync(fn, targetMs);
       const times = [];
       for (let m = 0; m < numM; m++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) fn();
         times.push((performance.now() - t0) / iters);
       }
       times.sort((a, b) => a - b);
       return { ms: times[times.length >> 1], iters };
     }

     async function calibrateAsync(fn, targetMs) {
       await fn(); await fn(); await fn();
       const t0 = performance.now();
       await fn();
       const elapsed = performance.now() - t0;
       if (elapsed < 0.001) return Math.ceil(targetMs / 0.020);
       return Math.max(2, Math.ceil(targetMs / elapsed));
     }

     async function measureAsync(fn, numM, targetMs) {
       const iters = await calibrateAsync(fn, targetMs);
       const times = [];
       for (let m = 0; m < numM; m++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) await fn();
         times.push((performance.now() - t0) / iters);
       }
       times.sort((a, b) => a - b);
       return { ms: times[times.length >> 1], iters };
     }

     async function verifyManualCorrectness(bytes, threads) {
       const expected = directDigestHex(bytes);
       const { hex: got } =
         await parallelDigestHex(bytes, threads);
       assert(got === expected,
         `manual mismatch ${bytes} ${threads}T: ` +
         `expected ${expected}, got ${got}`);
     }

     async function verifyAutoCorrectness(bytes) {
       const expected = directDigestHex(bytes);
       const { hex: got, threads } =
         await parallelDigestHex(bytes);
       assert(got === expected,
         `auto mismatch ${bytes}: ` +
         `expected ${expected}, got ${got}`);
       return threads;
     }

     function renderMainTable(rows) {
       let html = `<table>
         <tr>
           <th>Size</th>
           <th>BLAKE3 1T</th>
           <th>Time/byte</th>
           <th>SHA-256</th>
           <th>Time/byte</th>
           <th>BLAKE3 vs SHA-256</th>
           <th>BLAKE3 iters</th>
           <th>SHA-256 iters</th>
         </tr>`;
       for (const r of rows) {
         const ratio = r.shaMs / r.directMs;
         html += `<tr>
           <td>${r.sizeLabel}</td>
           <td>${fmtMs(r.directMs)}</td>
           <td><b>${fmtTimePerByte(r.directMs, r.bytes)}</b></td>
           <td>${fmtMs(r.shaMs)}</td>
           <td>${fmtTimePerByte(r.shaMs, r.bytes)}</b></td>
           <td class="${cellClass(ratio)}"><b>${ratio.toFixed(2)}×</b></td>
           <td class="dim">${r.hashIters}</td>
           <td class="dim">${r.shaIters}</td>
         </tr>`;
       }
       html += "</table>";
       mainResultsEl.innerHTML = html;
     }

     function renderManualTable(threadCounts, matrix,
       b3Baseline, shaBaseline)
     {
       let html = '<div class="tables-grid"><div class="slice-panel"><table><tr><th>Size</th>';
       for (const t of threadCounts) html += `<th>${t}T</th>`;
       html += '<th>Best</th></tr>';

       for (let si = 0; si < DATA_SIZES.length; si++) {
         const bytes = DATA_SIZES[si];
         const candidates = [{
           ms: b3Baseline[si], threadCount: 1,
         }];
         html += `<tr><td>${fmtSize(bytes)}</td>`;

         for (let ti = 0; ti < threadCounts.length; ti++) {
           const t = threadCounts[ti];
           if (t === 1) {
             const ms = b3Baseline[si];
             const vsSha = shaBaseline[si] / ms;
             html += `<td class="${cellClass(vsSha)}">
               <b>${fmtMs(ms)}</b><br>
               ${fmtTimePerByte(ms, bytes)}<br>
               <span class="dim">${vsSha.toFixed(2)}× vs SHA</span><br>
               <span class="dim">1T baseline</span>
             </td>`;
             continue;
           }

           const r = matrix[si][ti];
           if (r === undefined) {
             html += '<td>—</td>';
             continue;
           }

           candidates.push({ ms: r.ms, threadCount: t });
           const vsSha = shaBaseline[si] / r.ms;
           const vs1T = b3Baseline[si] / r.ms;
           html += `<td class="${cellClass(vsSha)}">
             <b>${fmtMs(r.ms)}</b><br>
             ${fmtTimePerByte(r.ms, bytes)}<br>
             <span class="dim">${vsSha.toFixed(2)}× vs SHA</span><br>
             <span class="dim">${vs1T.toFixed(2)}× vs 1T</span><br>
             <span class="dim">${r.cvs} CV</span>
           </td>`;
         }

         const best = bestOf(candidates);
         const bestVsSha = shaBaseline[si] / best.ms;
         const bestVs1T = b3Baseline[si] / best.ms;
         html += `<td class="${cellClass(bestVsSha)}">
           <b>${fmtMs(best.ms)}</b><br>
           ${fmtTimePerByte(best.ms, bytes)}<br>
           <span class="dim">${bestVsSha.toFixed(2)}× vs SHA</span><br>
           <span class="dim">${bestVs1T.toFixed(2)}× vs 1T</span><br>
           <span class="dim">${
             best.threadCount === 1
               ? "best: 1T"
               : `best: ${best.threadCount}T`
           }</span>
         </td></tr>`;
       }

       html += '</table></div></div>';
       manualResultsEl.innerHTML = html;
     }

     function renderAutoTable(rows) {
       let html = `<table>
         <tr>
           <th>Size</th>
           <th>Auto time</th>
           <th>Time/byte</th>
           <th>vs SHA-256</th>
           <th>vs BLAKE3 1T</th>
           <th>Threads</th>
           <th>CVs</th>
           <th>Iters</th>
         </tr>`;
       for (const r of rows) {
         if (r.skip) {
           html += `<tr>
             <td>${r.sizeLabel}</td>
             <td>—</td><td>—</td><td>—</td>
             <td>—</td><td>1T only</td><td>—</td><td>—</td>
           </tr>`;
           continue;
         }
         const vsSha = r.shaMs / r.autoMs;
         const vs1T = r.directMs / r.autoMs;
         html += `<tr>
           <td>${r.sizeLabel}</td>
           <td>${fmtMs(r.autoMs)}</td>
           <td><b>${fmtTimePerByte(r.autoMs, r.bytes)}</b></td>
           <td class="${cellClass(vsSha)}"><b>${vsSha.toFixed(2)}×</b></td>
           <td><b>${vs1T.toFixed(2)}×</b></td>
           <td>${r.threads}T</td>
           <td>${r.totalCvs}</td>
           <td class="dim">${r.autoIters}</td>
         </tr>`;
       }
       html += "</table>";
       plannerResultsEl.innerHTML = html;
     }

     async function runBenchmarks(quick = false) {
       const btnRun = document.getElementById("btn-run");
       const btnQuick = document.getElementById("btn-quick");
       const targetMs = quick ? 10 : 100;
       const numM = quick ? MEAS_QUICK : MEAS_FULL;

       btnRun.disabled = true;
       btnQuick.disabled = true;
       logLines.length = 0;
       logEl.textContent = "";
       mainResultsEl.innerHTML = "";
       manualResultsEl.innerHTML = "";
       plannerResultsEl.innerHTML = "";

       try {
         setStatus("Initializing multithreading-hasher…");
         await initHasherOnce();

         const threadCounts = Array.from(
           { length: hasher.maxThreads },
           (_, i) => i + 1);

         log(`library maxThreads = ${hasher.maxThreads}`);
         log(`library maxData    = ${fmtSize(hasher.maxData)}`);
         log(`benchmark mode     = ${quick ? "quick" : "full"}`);
         flushLog();

         // ── Correctness verification ──

         setStatus("Verifying manual correctness…");
         log("");
         log("── Manual multithread correctness ──");

         for (const t of threadCounts) {
           if (t === 1) continue;
           for (const bytes of VERIFY_SIZES) {
             if (!canRunParallel(bytes, t)) {
               log(`  - skip ${t}T ${fmtSize(bytes)}`);
               continue;
             }
             await verifyManualCorrectness(bytes, t);
             log(`  ✓ ${t}T ${fmtSize(bytes)}`);
           }
         }
         flushLog();

         setStatus("Verifying auto correctness…");
         log("");
         log("── Auto correctness ──");

         for (const bytes of VERIFY_SIZES) {
           if (bytes < SLICE_SIZE * 2) {
             log(`  - skip ${fmtSize(bytes).padStart(10)}  1T only`);
             continue;
           }
           const threads = await verifyAutoCorrectness(bytes);
           log(`  ✓ ${fmtSize(bytes).padStart(10)}  ${threads}T`);
         }
         flushLog();

         // ── Main-thread benchmarks ──

         setStatus("Running main-thread benchmarks…");

         const baselineByBytes = new Map();
         const mainRows = [];
         const b3Baseline = [];
         const shaBaseline = [];

         for (const bytes of DATA_SIZES) {
           assert(bytes <= hasher.maxData,
             `size exceeds maxData: ${bytes}`);

           const direct = measureSync(
             () => hashBlake3(bytes), numM, targetMs);
           const sha = await measureAsync(
             () => hashSha256(bytes), numM, targetMs);

           const row = {
             bytes,
             sizeLabel: fmtSize(bytes),
             directMs: direct.ms,
             hashIters: direct.iters,
             shaMs: sha.ms,
             shaIters: sha.iters,
           };

           baselineByBytes.set(bytes, row);
           mainRows.push(row);
           b3Baseline.push(direct.ms);
           shaBaseline.push(sha.ms);

           log(
             `${fmtSize(bytes).padStart(10)}  ` +
             `b3 ${fmtMs(direct.ms).padStart(10)} ` +
             `(${direct.iters} iters)  ` +
             `${fmtTimePerByte(direct.ms, bytes)}  ` +
             `sha256 ${fmtMs(sha.ms).padStart(10)} ` +
             `(${sha.iters} iters)  ` +
             `${fmtTimePerByte(sha.ms, bytes)}  ` +
             `b3-vs-sha ${(sha.ms / direct.ms).toFixed(2)}×`);
         }

         renderMainTable(mainRows);
         flushLog();

         // ── Thread sweep ──

         setStatus("Running thread sweep…");

         const matrix = DATA_SIZES.map(() => []);

         for (let ti = 0; ti < threadCounts.length; ti++) {
           const threadCount = threadCounts[ti];
           if (threadCount === 1) {
             renderManualTable(threadCounts, matrix,
               b3Baseline, shaBaseline);
             continue;
           }

           for (let si = 0; si < DATA_SIZES.length; si++) {
             const bytes = DATA_SIZES[si];

             if (!canRunParallel(bytes, threadCount)) {
               log(
                 `  ${fmtSize(bytes).padStart(12)} × ` +
                 `${threadCount}T  -> skipped`);
               continue;
             }

             const totalCvs =
               (bytes + SLICE_SIZE - 1) >>> 14;

             const result = await measureAsync(
               () => hashParallel(bytes, threadCount),
               numM, targetMs);

             matrix[si][ti] = {
               ms: result.ms,
               cvs: totalCvs,
             };

             const vsSha = shaBaseline[si] / result.ms;
             const vs1T = b3Baseline[si] / result.ms;

             log(
               `  ${fmtSize(bytes).padStart(12)} × ` +
               `${threadCount}T` +
               `  ${fmtMs(result.ms).padStart(10)} ` +
               `(${result.iters})` +
               `  ${fmtTimePerByte(result.ms, bytes)}` +
               `  ${vsSha.toFixed(2)}× vs SHA` +
               `  ${vs1T.toFixed(2)}× vs 1T` +
               `  ${totalCvs} CV`);
           }

           renderManualTable(threadCounts, matrix,
             b3Baseline, shaBaseline);
           flushLog();
         }

         renderManualTable(threadCounts, matrix,
           b3Baseline, shaBaseline);
         flushLog();

         // ── Auto thread count ──

         setStatus("Running auto-thread benchmarks…");

         const autoRows = [];

         for (let si = 0; si < DATA_SIZES.length; si++) {
           const bytes = DATA_SIZES[si];
           const baseline = baselineByBytes.get(bytes);

           if (bytes < SLICE_SIZE * 2) {
             autoRows.push({
               bytes,
               sizeLabel: fmtSize(bytes),
               skip: true,
             });
             log(`${fmtSize(bytes).padStart(10)}  ` +
               `auto  skipped  1T only`);
             continue;
           }

           let probeThreads;
           // warm up + get thread count
           probeThreads = await hashParallel(bytes);

           const totalCvs = (bytes + SLICE_SIZE - 1) >>> 14;

           const auto = await measureAsync(
             () => hashParallel(bytes),
             numM, targetMs);

           const row = {
             bytes,
             sizeLabel: fmtSize(bytes),
             autoMs: auto.ms,
             autoIters: auto.iters,
             directMs: baseline.directMs,
             shaMs: baseline.shaMs,
             totalCvs,
             threads: probeThreads,
           };

           autoRows.push(row);

           const vsSha = row.shaMs / row.autoMs;
           const vs1T = row.directMs / row.autoMs;

           log(
             `${fmtSize(bytes).padStart(10)}  ` +
             `auto ${fmtMs(row.autoMs).padStart(13)} ` +
             `(${row.autoIters} iters)  ` +
             `${fmtTimePerByte(row.autoMs, bytes)}  ` +
             `vs-sha ${vsSha.toFixed(2)}×  ` +
             `vs-b3-1t ${vs1T.toFixed(2)}×  ` +
             `${row.threads}T · ${row.totalCvs} CV`);
         }

         renderAutoTable(autoRows);
         flushLog();

         setStatus("Done");
         log("");
         log("════ All benchmarks complete ════");
         flushLog();
       } catch (e) {
         setError(`Error: ${e.message || e}`);
         log(`FATAL: ${e.stack || e}`);
         flushLog();
         console.error(e);
       } finally {
         btnRun.disabled = false;
         btnQuick.disabled = false;
       }
     }

     window.runBenchmarks = runBenchmarks;
    </script>
  </body>
</html>
