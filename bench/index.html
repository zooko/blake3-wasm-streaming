<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>BLAKE3 WASM — Rust Planner Benchmarks</title>
    <style>
     body {
       font-family: 'Courier New', monospace;
       background: #f7f8fb;
       color: #1f2937;
       padding: 20px;
       max-width: 1400px;
       margin: 0 auto;
     }
     h1, h2 { color: #1d4ed8; }
     table { border-collapse: collapse; margin: 10px 0; }
     th, td {
       border: 1px solid #d1d5db;
       padding: 4px 12px;
       text-align: right;
       font-family: monospace;
     }
     th {
       background: #e0e7ff;
       color: #1e3a8a;
     }
     td:first-child, th:first-child { text-align: left; }

     button {
       font-size: 16px;
       padding: 8px 20px;
       margin: 5px 5px 5px 0;
       cursor: pointer;
     }
     button:disabled {
       opacity: 0.4;
       cursor: default;
     }

     #status {
       font-weight: bold;
       margin: 10px 0;
     }

     #log {
       white-space: pre-wrap;
       font-size: 12px;
       color: #374151;
       margin-top: 20px;
       max-height: 500px;
       overflow-y: auto;
       background: #ffffff;
       padding: 10px;
       border: 1px solid #d1d5db;
     }

     .cell-win  { background-color: #dcfce7; color: #166534; }
     .cell-lose { background-color: #fee2e2; color: #b91c1c; }
     .dim { color: #6b7280; font-size: 0.85em; }
     .err { color: #b91c1c; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>BLAKE3 WASM — Rust Planner Benchmarks</h1>

    <p>
      Shared-memory WASM with Rust-side dispatch and worker orchestration.<br>
      JS does only browser-mandated glue: load WASM, create workers, wait on atomics, render tables.
    </p>

    <p>Cores: <span id="cores"></span></p>

    <button id="btn-run" onclick="window.runBenchmarks(false)">Run Benchmarks</button>
    <button id="btn-quick" onclick="window.runBenchmarks(true)">Quick Run (fewer measurements)</button>

    <div id="status"></div>

    <h2>Main-Thread Benchmarks — BLAKE3 vs WebCrypto SHA-256 (1T)</h2>
    <div id="main-results"></div>

    <h2>Rust-Planner Benchmarks</h2>
    <div id="planner-results"></div>

    <pre id="log"></pre>

    <script type="module">
     const WASM_URL = '../target/wasm32-unknown-unknown/release/blake3_wasm_streaming.wasm';
     const WORKER_URL = '../hash-worker.js';
     const CV_LEN = 32;
     const WASM_PAGES = 65536;

     const DATA_SIZES = [
       64,
       1536,
       16385,
       96 * 1024,
       160 * 1024,
       200000,
       230000,
       262208,
       290000,
       300000,
       330000,
       336000,
       384 * 1024,
       2000000,
     ];

     const MEAS_FULL = 9;
     const MEAS_QUICK = 5;

     const SLICE  = 1;
     const ACTIVE = 2;
     const SIGNAL = 4;
     const READY = 6;

     const logEl = document.getElementById('log');
     const statusEl = document.getElementById('status');
     const mainResultsEl = document.getElementById('main-results');
     const plannerResultsEl = document.getElementById('planner-results');

     document.getElementById('cores').textContent = navigator.hardwareConcurrency || '?';

     let wasmModule;
     let wasmMemory;
     let wasmExports;

     let ctrlPtr;
     let dataPtr;
     let outPtr;
     let stacksBase;
     let stackSize;

     let ctrlI32;
     let sha256Data;
     let signalSeen = 0;

     let maxData = 0;
     let maxSlices = 0;
     let maxThreads = 0;
     let ctrlWords = 0;

     const workers = [];
     const logLines = [];

     function assert(cond, msg) {
       if (!cond) throw new Error(msg);
     }

     function log(msg) {
       logLines.push(msg);
     }

     function flushLog() {
       logEl.textContent = logLines.join('\n');
       logEl.scrollTop = logEl.scrollHeight;
     }

     function setStatus(msg) {
       statusEl.textContent = msg;
       statusEl.className = '';
     }

     function setError(msg) {
       statusEl.textContent = msg;
       statusEl.className = 'err';
     }

     function fmtMs(ms) {
       if (ms >= 1) return ms.toFixed(3) + ' ms';
       if (ms >= 0.001) return (ms * 1000).toFixed(1) + ' µs';
       return (ms * 1e6).toFixed(0) + ' ns';
     }

     function fmtTimePerByte(ms, bytes) {
       const nsB = (ms * 1e6) / bytes;
       if (nsB >= 1000) return (nsB / 1000).toFixed(2) + ' µs/B';
       if (nsB >= 1) return nsB.toFixed(2) + ' ns/B';
       return (nsB * 1000).toFixed(0) + ' ps/B';
     }

     function fmtSize(bytes) {
       if (bytes >= 1048576 && bytes % 1048576 === 0) return (bytes / 1048576) + ' MiB';
       if (bytes >= 1024 && bytes % 1024 === 0) return (bytes / 1024) + ' KiB';
       return bytes.toLocaleString() + ' B';
     }

     function cellClass(ratio) {
       return ratio > 1.10 ? 'cell-win' : ratio < 0.90 ? 'cell-lose' : '';
     }

     function hex(buf) {
       return Array.from(new Uint8Array(buf))
                   .map(b => b.toString(16).padStart(2, '0'))
                   .join('');
     }

     function calibrateSync(fn, targetMs) {
       fn(); fn(); fn();
       const probe = 5;
       const t0 = performance.now();
       for (let i = 0; i < probe; i++) fn();
       const elapsed = performance.now() - t0;
       const perIter = elapsed / probe;
       if (perIter < 0.001) return Math.ceil(targetMs / 0.020);
       return Math.max(3, Math.ceil(targetMs / perIter));
     }

     function measureSync(fn, numMeasurements, targetMs) {
       const iters = calibrateSync(fn, targetMs);
       const times = [];
       for (let m = 0; m < numMeasurements; m++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) fn();
         times.push((performance.now() - t0) / iters);
       }
       times.sort((a, b) => a - b);
       return { ms: times[times.length >> 1], iters };
     }

     async function calibrateAsync(fn, targetMs) {
       await fn(); await fn(); await fn();
       const t0 = performance.now();
       await fn();
       const elapsed = performance.now() - t0;
       if (elapsed < 0.001) return Math.ceil(targetMs / 0.020);
       return Math.max(2, Math.ceil(targetMs / elapsed));
     }

     async function measureAsync(fn, numMeasurements, targetMs) {
       const iters = await calibrateAsync(fn, targetMs);
       const times = [];
       for (let m = 0; m < numMeasurements; m++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) await fn();
         times.push((performance.now() - t0) / iters);
       }
       times.sort((a, b) => a - b);
       return { ms: times[times.length >> 1], iters };
     }

     async function initWasm() {
       const resp = await fetch(WASM_URL);
       const bytes = await resp.arrayBuffer();

       wasmModule = await WebAssembly.compile(bytes);
       wasmMemory = new WebAssembly.Memory({
         initial: WASM_PAGES,
         maximum: WASM_PAGES,
         shared: true,
       });

       const { exports } = await WebAssembly.instantiate(wasmModule, {
         env: { memory: wasmMemory },
       });

       wasmExports = exports;

       assert(typeof wasmExports.layout_ctrl_ptr === 'function', 'missing layout_ctrl_ptr');
       assert(typeof wasmExports.layout_data_ptr === 'function', 'missing layout_data_ptr');
       assert(typeof wasmExports.layout_out_ptr === 'function', 'missing layout_out_ptr');
       assert(typeof wasmExports.layout_stacks_base === 'function', 'missing layout_stacks_base');
       assert(typeof wasmExports.config_max_data === 'function', 'missing config_max_data');
       assert(typeof wasmExports.config_max_slices === 'function', 'missing config_max_slices');
       assert(typeof wasmExports.config_max_threads === 'function', 'missing config_max_threads');
       assert(typeof wasmExports.config_ctrl_words === 'function', 'missing config_ctrl_words');
       assert(typeof wasmExports.config_stack_size === 'function', 'missing config_stack_size');
       assert(typeof wasmExports.blake3_hash === 'function', 'missing blake3_hash');
       assert(typeof wasmExports.dispatch_auto === 'function', 'missing dispatch_auto');
       assert(typeof wasmExports.merge_cv_tree === 'function', 'missing merge_cv_tree');
       assert(typeof Atomics.waitAsync === 'function', 'missing Atomics.waitAsync');

       ctrlPtr = wasmExports.layout_ctrl_ptr();
       dataPtr = wasmExports.layout_data_ptr();
       outPtr = wasmExports.layout_out_ptr();
       stacksBase = wasmExports.layout_stacks_base();

       maxData = wasmExports.config_max_data();
       maxSlices = wasmExports.config_max_slices();
       maxThreads = wasmExports.config_max_threads();
       ctrlWords = wasmExports.config_ctrl_words();
       stackSize = wasmExports.config_stack_size();

       ctrlI32 = new Int32Array(wasmMemory.buffer, ctrlPtr, ctrlWords);

       const heap = new Uint8Array(wasmMemory.buffer);
       for (let i = 0; i < maxData; i++) heap[dataPtr + i] = i & 255;

       sha256Data = new Uint8Array(maxData);
       sha256Data.set(heap.subarray(dataPtr, dataPtr + maxData));

       signalSeen = Atomics.load(ctrlI32, SIGNAL);

       log('Shared WASM layout:');
       log(`  ctrl     @ ${ctrlPtr}`);
       log(`  data     @ ${dataPtr}`);
       log(`  out      @ ${outPtr} (${maxSlices * CV_LEN} bytes)`);
       log(`  threads  @ ${maxThreads}`);
       log(`  stacks   @ ${stacksBase}`);
       log(`  stacksz  @ ${stackSize}`);
     }

     function spawnWorkers() {
       assert(workers.length === 0, 'workers already spawned');
       for (let i = 0; i < maxThreads - 1; i++) {
         const worker = new Worker(new URL(WORKER_URL, import.meta.url), { type: 'module' });
         worker.postMessage({
           wasmModule,
           memory: wasmMemory,
           index: i,
           ctrlPtr,
           dataPtr,
           stackPtr: stacksBase + (i + 1) * stackSize,
           cvPtr: outPtr,
         });
         workers.push(worker);
       }
     }

     async function waitUntilAtLeast(ctrl, idx, target) {
       while (Atomics.load(ctrl, idx) < target) {
         const cur = Atomics.load(ctrl, idx);
         const r = Atomics.waitAsync(ctrl, idx, cur);
         if (r.async) await r.value;
       }
     }

     async function waitForSignalChange(expected) {
       await Atomics.waitAsync(ctrlI32, SIGNAL, expected).value;
     }

     function readDigestHex() {
       return hex(new Uint8Array(wasmMemory.buffer, outPtr, CV_LEN));
     }

     function hashBlake3(bytes) {
       wasmExports.blake3_hash(dataPtr, bytes, outPtr);
     }

     async function hashSha256(bytes) {
       const view = sha256Data.subarray(0, bytes);
       await crypto.subtle.digest('SHA-256', view);
     }

     async function runRustPlanner(bytes) {
       const expected = signalSeen;
       const totalCvs = wasmExports.dispatch_auto(ctrlPtr, dataPtr, bytes, outPtr);

       if (totalCvs > 1) {
         await waitForSignalChange(expected);
         signalSeen = Atomics.load(ctrlI32, SIGNAL);
         wasmExports.merge_cv_tree(outPtr, totalCvs, outPtr);
       }

       return totalCvs;
     }

     async function probeRustPlanner(bytes) {
       const totalCvs = await runRustPlanner(bytes);
       return {
         totalCvs,
         sliceSize: Atomics.load(ctrlI32, SLICE),
         threads: Atomics.load(ctrlI32, ACTIVE) + 1,
         direct: totalCvs === 1,
       };
     }

     async function verifyRustPlannerCorrectness(bytes) {
       hashBlake3(bytes);
       const ref = readDigestHex();

       const meta = await probeRustPlanner(bytes);
       const got = readDigestHex();

       assert(ref === got, `planner mismatch at ${bytes}`);

       return meta;
     }

     function renderMainTable(rows) {
       let html = `<table>
         <tr>
           <th>Data Size</th>
           <th>BLAKE3 1T</th>
           <th>BLAKE3 Time/byte</th>
           <th>SHA-256 (WebCrypto, 1T)</th>
           <th>SHA-256 Time/byte</th>
           <th>BLAKE3 vs SHA-256</th>
           <th>Iters</th>
         </tr>`;

       for (const r of rows) {
         const b3vsSha = r.shaMs / r.directMs;
         html += `<tr>
            <td>${r.sizeLabel}</td>
            <td>${fmtMs(r.directMs)}</td>
            <td><b>${fmtTimePerByte(r.directMs, r.bytes)}</b></td>
            <td>${fmtMs(r.shaMs)}</td>
            <td><b>${fmtTimePerByte(r.shaMs, r.bytes)}</b></td>
            <td class="${cellClass(b3vsSha)}"><b>${b3vsSha.toFixed(2)}×</b></td>
            <td class="dim">${r.hashIters} / ${r.shaIters}</td>
          </tr>`;
       }

       html += '</table>';
       mainResultsEl.innerHTML = html;
     }

     function renderPlannerTable(rows) {
       let html = `<table>
         <tr>
           <th>Data Size</th>
           <th>Rust Planner</th>
           <th>Planner Time/byte</th>
           <th>Planner vs SHA-256</th>
           <th>Planner vs BLAKE3 1T</th>
           <th>Actual Plan</th>
           <th>Iters</th>
         </tr>`;

       for (const r of rows) {
         const vsSha = r.shaMs / r.plannerMs;
         const vs1T = r.directMs / r.plannerMs;

         html += `<tr>
            <td>${r.sizeLabel}</td>
            <td>${fmtMs(r.plannerMs)}</td>
            <td><b>${fmtTimePerByte(r.plannerMs, r.bytes)}</b></td>
            <td class="${cellClass(vsSha)}"><b>${vsSha.toFixed(2)}×</b></td>
            <td><b>${vs1T.toFixed(2)}×</b></td>
            <td>${
              r.direct
                ? '1T · direct'
                : `${r.threads}T · ${r.totalCvs} CV · slice ${fmtSize(r.sliceSize)}`
            }</td>
            <td class="dim">${r.plannerIters}</td>
          </tr>`;
       }

       html += '</table>';
       plannerResultsEl.innerHTML = html;
     }

     async function runBenchmarks(quick = false) {
       const btnRun = document.getElementById('btn-run');
       const btnQuick = document.getElementById('btn-quick');
       const targetMs = quick ? 40 : 200;
       const numM = quick ? MEAS_QUICK : MEAS_FULL;

       btnRun.disabled = true;
       btnQuick.disabled = true;

       logLines.length = 0;
       mainResultsEl.innerHTML = '';
       plannerResultsEl.innerHTML = '';
       logEl.textContent = '';

       try {
         setStatus('Loading WASM…');
         await initWasm();

         setStatus('Spawning workers…');
         spawnWorkers();
         if (maxThreads > 1) {
           await waitUntilAtLeast(ctrlI32, READY, maxThreads - 1);
         }

         const baselineByBytes = new Map();
         const mainRows = [];

         setStatus('Running main-thread benchmarks…');

         for (const bytes of DATA_SIZES) {
           assert(bytes <= maxData, `size exceeds maxData: ${bytes}`);

           const direct = measureSync(() => hashBlake3(bytes), numM, targetMs);
           const sha = await measureAsync(() => hashSha256(bytes), numM, targetMs);

           const row = {
             bytes,
             sizeLabel: fmtSize(bytes),
             directMs: direct.ms,
             hashIters: direct.iters,
             shaMs: sha.ms,
             shaIters: sha.iters,
           };

           baselineByBytes.set(bytes, row);
           mainRows.push(row);

           const b3vsSha = sha.ms / direct.ms;
           log(
             `${fmtSize(bytes).padStart(10)}  ` +
             `b3 ${fmtMs(direct.ms).padStart(10)} (${direct.iters} iters)  ` +
             `${fmtTimePerByte(direct.ms, bytes)}  ` +
             `sha256 ${fmtMs(sha.ms).padStart(10)} (${sha.iters} iters)  ` +
             `${fmtTimePerByte(sha.ms, bytes)}  ` +
             `b3-vs-sha ${b3vsSha.toFixed(2)}×`
           );
         }

         renderMainTable(mainRows);
         flushLog();

         const plannerRows = [];

         setStatus('Running planner benchmarks…');

         for (const bytes of DATA_SIZES) {
           const baseline = baselineByBytes.get(bytes);
           assert(baseline !== undefined, `missing baseline for ${bytes}`);

           const probe = await verifyRustPlannerCorrectness(bytes);

           const planner = await measureAsync(
             () => runRustPlanner(bytes),
             numM,
             targetMs,
           );

           const row = {
             bytes,
             sizeLabel: fmtSize(bytes),
             plannerMs: planner.ms,
             plannerIters: planner.iters,
             directMs: baseline.directMs,
             shaMs: baseline.shaMs,
             totalCvs: probe.totalCvs,
             sliceSize: probe.sliceSize,
             threads: probe.threads,
             direct: probe.direct,
           };

           plannerRows.push(row);

           const vsSha = row.shaMs / row.plannerMs;
           const vs1T = row.directMs / row.plannerMs;

           log(
             `${fmtSize(bytes).padStart(10)}  ` +
             `planner ${fmtMs(row.plannerMs).padStart(10)} (${planner.iters} iters)  ` +
             `${fmtTimePerByte(row.plannerMs, bytes)}  ` +
             `vs-sha ${vsSha.toFixed(2)}×  ` +
             `vs-b3-1t ${vs1T.toFixed(2)}×  ` +
             `${
                row.direct
                  ? '1T · direct'
                  : `${row.threads}T · ${row.totalCvs} CV · slice ${fmtSize(row.sliceSize)}`
              }`
           );
         }

         renderPlannerTable(plannerRows);
         flushLog();

         setStatus('Done!');
         log('\n════ All benchmarks complete ════');
         flushLog();
       } catch (e) {
         setError(`Error: ${e.message || e}`);
         log(`FATAL: ${e.stack || e}`);
         flushLog();
         console.error(e);
       } finally {
         btnRun.disabled = false;
         btnQuick.disabled = false;
       }
     }

     window.runBenchmarks = runBenchmarks;
    </script>
  </body>
</html>
