<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BLAKE3 WASM – bench</title>
    <style>
     body { background:#1e1e1e; color:#d4d4d4; font-family:monospace; margin:2em; }
     h1 { color:#569cd6; }
     table { border-collapse:collapse; margin:1em 0; }
     th,td { border:1px solid #444; padding:4px 10px; text-align:right; }
     th { background:#264f78; }
     .pass { color:#6a9955; } .fail { color:#f44747; }
     #log { white-space:pre-wrap; font-size:0.85em; margin-top:1em;
       background:#181818; padding:1em; max-height:50vh; overflow-y:auto; }
     button { font-size:1.1em; padding:0.4em 1.2em; margin:0.5em 0; }
    </style>
  </head>
  <body>
    <h1>BLAKE3 WASM Benchmark</h1>
    <p id="info"></p>
    <button id="run" onclick="runAll()">Run Benchmarks</button>
    <div id="results"></div>
    <div id="log"></div>

    <script type="module">

     const MY_PKG_PATH  = '../pkg/blake3_wasm_streaming.js';
     const HIS_PKG_PATH = '../../lamb356-blake3-wasm/blake3-wasm-shared/pkg/blake3_wasm_shared.js';

     const PARCEL_LEN    = 65536;          // 64 KiB
     const CV_LEN        = 32;
     const MEASUREMENTS  = 10;

     const $log     = document.getElementById('log');
     const $results = document.getElementById('results');
     const $info    = document.getElementById('info');
     const $btn     = document.getElementById('run');

     function log(msg) { $log.textContent += msg + '\n'; }
     function clearLog() { $log.textContent = ''; $results.innerHTML = ''; }

     $info.textContent = `${navigator.userAgent}  | hardwareConcurrency=${navigator.hardwareConcurrency}`;

     function wrapMy(pkg, wasm) {
       return {
         alloc:   (n) => pkg.alloc(n),
         dealloc: (ptr, n) => pkg.dealloc(ptr, n),
         memory:  wasm.memory,
         hashParcel(inPtr, len, offset, outPtr) {
           pkg.hash_64k_parcel_to_cv_from_ptr(inPtr, len, offset, outPtr);
         },
       };
     }

     function wrapHis(pkg, wasm) {
       return {
         alloc:   (n) => pkg.alloc_input(n),
         dealloc: (ptr, n) => pkg.free_input(ptr, n),
         memory:  wasm.memory,
         hashParcel(inPtr, len, offset, outPtr) {
           pkg.hash_subtree_ptr_into(inPtr, len, offset, outPtr);
         },
       };
     }

     let my, his;

     async function loadModules() {
       if (my && his) return;
       const [myMod, hisMod] = await Promise.all([
         import(MY_PKG_PATH),
         import(HIS_PKG_PATH),
       ]);
       const myWasm  = await myMod.default();
       const hisWasm = await hisMod.default();
       my  = wrapMy(myMod, myWasm);
       his = wrapHis(hisMod, hisWasm);
       log(`my  memory: ${my.memory.buffer.byteLength} bytes`);
       log(`his memory: ${his.memory.buffer.byteLength} bytes`);
     }

     function fillDeterministic(heap, ptr, len) {
       for (let i = 0; i < len; i++) heap[ptr + i] = i & 0xff;
     }

     function hex(u8, n = u8.length) {
       let s = '';
       for (let i = 0; i < n; i++) s += u8[i].toString(16).padStart(2, '0');
       return s;
     }

     function median(arr) {
       const s = [...arr].sort((a, b) => a - b);
       return s[s.length >> 1];
     }

     function sum(arr) {
       return arr.reduce((a, b) => a + b, 0);
     }

     // Returns array of raw elapsed ms, each entry covering `iters` iterations.
     function benchPokeOnly(w, numParcels, iters) {
       const totalBytes = numParcels * PARCEL_LEN;
       const ptr = w.alloc(totalBytes);
       const heap = new Uint8Array(w.memory.buffer);

       const times = [];
       for (let j = 0; j < MEASUREMENTS; j++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) {
           fillDeterministic(heap, ptr, totalBytes);
         }
         times.push(performance.now() - t0);
       }

       w.dealloc(ptr, totalBytes);
       return times;
     }

     // Returns { times: raw elapsed ms[], lastCv }
     function benchParcelCvs(w, numParcels, iters) {
       const inPtr  = w.alloc(PARCEL_LEN);
       const outPtr = w.alloc(CV_LEN);
       const heap   = new Uint8Array(w.memory.buffer);
       fillDeterministic(heap, inPtr, PARCEL_LEN);

       const PARCEL_LEN_BIG = BigInt(PARCEL_LEN);

       const times = [];
       for (let j = 0; j < MEASUREMENTS; j++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) {
           let off = 0n;
           for (let p = 0; p < numParcels; p++) {
             w.hashParcel(inPtr, PARCEL_LEN, off, outPtr);
             off += PARCEL_LEN_BIG;
           }
         }
         times.push(performance.now() - t0);
       }

       const lastCv = new Uint8Array(w.memory.buffer, outPtr, CV_LEN).slice();
       w.dealloc(outPtr, CV_LEN);
       w.dealloc(inPtr, PARCEL_LEN);
       return { times, lastCv };
     }

     function correctnessCheck() {
       function hashOne(w, offset) {
         const inPtr  = w.alloc(PARCEL_LEN);
         const outPtr = w.alloc(CV_LEN);
         const heap   = new Uint8Array(w.memory.buffer);
         fillDeterministic(heap, inPtr, PARCEL_LEN);
         w.hashParcel(inPtr, PARCEL_LEN, offset, outPtr);
         const cv = new Uint8Array(w.memory.buffer, outPtr, CV_LEN).slice();
         w.dealloc(outPtr, CV_LEN);
         w.dealloc(inPtr, PARCEL_LEN);
         return cv;
       }

       const myCv0  = hashOne(my,  0n);
       const hisCv0 = hashOne(his, 0n);
       const match  = myCv0.every((v, i) => v === hisCv0[i]);

       log(`\nCorrectness (parcel 0, offset 0):`);
       log(`  mine: ${hex(myCv0)}`);
       log(`  his:  ${hex(hisCv0)}`);
       log(`  ${match ? '✅ MATCH' : '❌ MISMATCH'}`);

       const myCv1 = hashOne(my, 65536n);
       const offsetDiffers = !myCv0.every((v, i) => v === myCv1[i]);
       log(`  offset 0 vs 65536: ${offsetDiffers ? '✅ different (good)' : '❌ same (bad — offset ignored?)'}`);

       return match;
     }

     function renderTable(title, rows) {
       let html = `<h3>${title}</h3><table>
         <tr><th>Side</th><th>Parcels</th><th>Iters</th><th>Median ms/iter</th><th>Total ms</th></tr>`;
       for (const r of rows) {
         html += `<tr><td>${r.label}</td><td>${r.parcels}</td>
           <td>${r.iters}</td>
           <td>${(r.medianMs / r.iters).toFixed(3)}</td>
           <td>${r.sumMs.toFixed(1)}</td></tr>`;
       }
       html += '</table>';
       return html;
     }

     async function runAll() {
       $btn.disabled = true;
       clearLog();
       log('Loading modules…');

       try {
         await loadModules();
         correctnessCheck();

         let html = '';

         // ── poke_only ─────────────────────────────────────────────
         {
           const parcels = 64;
           const iters = 10;
           log(`\npoke_only: ${parcels} parcels, ${iters} iters…`);
           const myTimes  = benchPokeOnly(my,  parcels, iters);
           const hisTimes = benchPokeOnly(his, parcels, iters);

           html += renderTable('poke_only (JS writes into WASM memory)', [
             { label: 'mine', parcels, iters, medianMs: median(myTimes), sumMs: sum(myTimes) },
             { label: 'his',  parcels, iters, medianMs: median(hisTimes), sumMs: sum(hisTimes) },
           ]);
         }

         // ── parcel CVs ────────────────────────────────────────────
         for (const parcels of [16, 64, 256]) {
           const iters = Math.max(1, Math.floor(1000 / parcels));
           log(`\nparcel_cvs: ${parcels} parcels, ${iters} iters…`);

           const myR  = benchParcelCvs(my,  parcels, iters);
           const hisR = benchParcelCvs(his, parcels, iters);

           log(`  mine  median ${(median(myR.times) / iters).toFixed(3)} ms/iter  last_cv=${hex(myR.lastCv, 8)}…`);
           log(`  his   median ${(median(hisR.times) / iters).toFixed(3)} ms/iter  last_cv=${hex(hisR.lastCv, 8)}…`);

           html += renderTable(`parcel_cvs — ${parcels} × 64 KiB parcels`, [
             { label: 'mine', parcels, iters, medianMs: median(myR.times), sumMs: sum(myR.times) },
             { label: 'his',  parcels, iters, medianMs: median(hisR.times), sumMs: sum(hisR.times) },
           ]);
         }

         $results.innerHTML = html;
         log('\nDone.');
       } catch (e) {
         log(`ERROR: ${e}\n${e.stack || ''}`);
       } finally {
         $btn.disabled = false;
       }
     }

     window.runAll = runAll;
    </script>
  </body>
</html>
