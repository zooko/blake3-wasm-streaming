<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BLAKE3 WASM – bench (2D sweep)</title>
    <style>
     body { background:#1e1e1e; color:#d4d4d4; font-family:monospace; margin:2em; }
     h1 { color:#569cd6; }
     h2 { color:#4ec9b0; margin-top:2em; }
     h3 { color:#dcdcaa; margin-top:1.5em; }
     table { border-collapse:collapse; margin:1em 0; font-size:0.85em; }
     th,td { border:1px solid #444; padding:3px 8px; text-align:right; white-space:nowrap; }
     th { background:#264f78; }
     td.label { text-align:left; background:#2d2d2d; }
     td.header { text-align:center; background:#1a3a5c; font-weight:bold; }
     .pass { color:#6a9955; } .fail { color:#f44747; }
     .fast { color:#6a9955; } .slow { color:#f44747; } .neutral { color:#d4d4d4; }
     #log { white-space:pre-wrap; font-size:0.82em; margin-top:1em;
       background:#181818; padding:1em; max-height:50vh; overflow-y:auto; }
     button { font-size:1.1em; padding:0.4em 1.2em; margin:0.5em 0.5em 0.5em 0; }
     .progress { color:#569cd6; font-weight:bold; }
     .matrix td.best { background:#1a3a1a; }
    </style>
  </head>
  <body>
    <h1>BLAKE3 WASM Benchmark — 2D Sweep</h1>
    <p id="info"></p>
    <button id="run" onclick="runAll()">Run All Benchmarks</button>
    <button id="run-quick" onclick="runAll(true)">Quick Run (fewer measurements)</button>
    <span id="progress" class="progress"></span>
    <div id="results"></div>
    <div id="log"></div>

    <script type="module">

     import { StreamingHasher } from '../streaming-hasher.js';

     const MY_PKG_PATH  = '../pkg/blake3_wasm_streaming.js';
     const HIS_PKG_PATH = '../../lamb356-blake3-wasm/blake3-wasm-shared/pkg/blake3_wasm_shared.js';

     const CV_LEN       = 32;

     /* ── Parameters to sweep ─────────────────────────────── */

     const PARCEL_SIZES = [
       { label: '64 B',    bytes: 64 },
       { label: '512 B',   bytes: 512 },
       { label: '1 KiB',   bytes: 1024 },
       { label: '2 KiB',   bytes: 2048 },
       { label: '4 KiB',   bytes: 4096 },
       { label: '16 KiB',  bytes: 16384 },
       { label: '64 KiB',  bytes: 65536 },
       { label: '256 KiB', bytes: 262144 },
       { label: '1 MiB',   bytes: 1048576 },
     ];

     const THREAD_COUNTS = [2, 3, 4, 5, 6, 7, 12, 16];

     // Number of parcels per benchmark iteration — enough work to saturate threads
     const NUM_PARCELS = 64;

     const $log      = document.getElementById('log');
     const $results  = document.getElementById('results');
     const $info     = document.getElementById('info');
     const $btn      = document.getElementById('run');
     const $btnQuick = document.getElementById('run-quick');
     const $progress = document.getElementById('progress');

     function log(msg) { $log.textContent += msg + '\n'; $log.scrollTop = $log.scrollHeight; }
     function clearLog() { $log.textContent = ''; $results.innerHTML = ''; }
     function setProgress(msg) { $progress.textContent = msg; }

     $info.textContent = `${navigator.userAgent}  | cores=${navigator.hardwareConcurrency}`;

     /* ── helpers ────────────────────────────────────────────── */

     function fillDeterministic(buf, offset, len) {
       for (let i = 0; i < len; i++) buf[offset + i] = i & 0xff;
     }

     function hex(u8, n = u8.length) {
       let s = '';
       for (let i = 0; i < n; i++) s += u8[i].toString(16).padStart(2, '0');
       return s;
     }

     function median(arr) {
       const s = [...arr].sort((a, b) => a - b);
       return s[s.length >> 1];
     }

     function sum(arr) {
       return arr.reduce((a, b) => a + b, 0);
     }

     // Decide iteration count to keep total runtime reasonable
     // Target ~500ms of work per measurement for large parcels, more iters for small
     function autoIters(parcelBytes, numParcels, quick) {
       const totalBytesPerIter = parcelBytes * numParcels;
       // Rough: ~1 GB/s hashing speed, aim for ~200ms per measurement
       const targetMs = quick ? 50 : 200;
       const estMsPerIter = (totalBytesPerIter / 1e9) * 1000; // at 1 GB/s
       const iters = Math.max(1, Math.min(500, Math.round(targetMs / Math.max(estMsPerIter, 0.01))));
       return iters;
     }

     function autoMeasurements(quick) { return quick ? 5 : 10; }

     /* ── direct-call wrappers ──────────────────────────────── */

     function wrapMy(pkg, memory) {
       return {
         alloc:   (n) => pkg.alloc(n),
         dealloc: (ptr, n) => pkg.dealloc(ptr, n),
         memory,
         hashParcel(inPtr, len, offset, outPtr) {
           pkg.hash_64k_parcel_to_cv_from_ptr(inPtr, len, offset, outPtr);
         },
       };
     }

     function wrapHis(pkg, wasm) {
       return {
         alloc:   (n) => pkg.alloc_input(n),
         dealloc: (ptr, n) => pkg.free_input(ptr, n),
         memory:  wasm.memory,
         hashParcel(inPtr, len, offset, outPtr) {
           pkg.hash_subtree_ptr_into(inPtr, len, offset, outPtr);
         },
       };
     }

     let my, his;

     async function loadHis() {
       if (his) return;
       const hisMod  = await import(HIS_PKG_PATH);
       const hisWasm = await hisMod.default();
       his = wrapHis(hisMod, hisWasm);
     }

     /* ── streaming hasher (re-initializable with different thread counts) ── */

     let currentStreaming = null;
     let currentThreadCount = 0;

     async function getStreamingHasher(threadCount) {
       if (currentStreaming && currentThreadCount === threadCount) {
         return currentStreaming;
       }

       // Tear down old one
       if (currentStreaming) {
         currentStreaming.terminate();
         currentStreaming = null;
         currentThreadCount = 0;
       }

       const sh = new StreamingHasher(threadCount);
       await sh.init();
       currentStreaming = sh;
       currentThreadCount = threadCount;

       // Also set up "my" wrapper from the same instance
       my = {
         alloc:   (n) => sh.pkg.alloc(n),
         dealloc: (ptr, n) => sh.pkg.dealloc(ptr, n),
         memory:  sh.memory,
         hashParcel(inPtr, len, offset, outPtr) {
           sh.pkg.hash_64k_parcel_to_cv_from_ptr(inPtr, len, offset, outPtr);
         },
       };

       return sh;
     }

     /* ════════════════════════════════════════════════════════
        Benchmark: poke_only (raw JS writes into wasm memory)
        ════════════════════════════════════════════════════════ */

     function benchPokeOnly(w, parcelBytes, numParcels, iters, measurements) {
       const totalBytes = numParcels * parcelBytes;
       const ptr = w.alloc(totalBytes);
       const heap = new Uint8Array(w.memory.buffer);

       const times = [];
       for (let j = 0; j < measurements; j++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) {
           fillDeterministic(heap, ptr, totalBytes);
         }
         times.push(performance.now() - t0);
       }

       w.dealloc(ptr, totalBytes);
       return times;
     }

     /* ════════════════════════════════════════════════════════
        Benchmark: poke_and_deliver (write + send to worker)
        ════════════════════════════════════════════════════════ */

     async function benchPokeAndDeliver(w, parcelBytes, numParcels, iters, measurements) {
       const isShared = w.memory.buffer instanceof SharedArrayBuffer;

       const src = `
    let sharedBuf = null;
    self.onmessage = (e) => {
      const msg = e.data;
      if (msg.type === 'init') {
        sharedBuf = msg.buffer;
        self.postMessage({ type: 'ready' });
      } else if (msg.type === 'read') {
        const view = msg.buffer
          ? new Uint8Array(msg.buffer)
          : new Uint8Array(sharedBuf, msg.ptr, msg.size);
        let xor = 0;
        for (let i = 0; i < view.length; i++) xor ^= view[i];
        self.postMessage({ type: 'done', xor });
      }
    };
       `;
       const blob = new Blob([src], { type: 'application/javascript' });
       const url  = URL.createObjectURL(blob);
       const worker = new Worker(url);

       await new Promise(resolve => {
         worker.onmessage = (e) => { if (e.data.type === 'ready') resolve(); };
         worker.postMessage({
           type: 'init',
           buffer: isShared ? w.memory.buffer : null,
         });
       });

       const totalBytes = numParcels * parcelBytes;
       const ptr = w.alloc(totalBytes);

       const times = [];
       for (let j = 0; j < measurements; j++) {
         const t0 = performance.now();
         for (let it = 0; it < iters; it++) {
           for (let p = 0; p < numParcels; p++) {
             const off = ptr + p * parcelBytes;
             const heap = new Uint8Array(w.memory.buffer);
             fillDeterministic(heap, off, parcelBytes);

             await new Promise(resolve => {
               worker.onmessage = (e) => { if (e.data.type === 'done') resolve(); };
               if (isShared) {
                 worker.postMessage({ type: 'read', ptr: off, size: parcelBytes });
               } else {
                 const copy = heap.slice(off, off + parcelBytes);
                 worker.postMessage(
                   { type: 'read', buffer: copy.buffer },
                   [copy.buffer],
                 );
               }
             });
           }
         }
         times.push(performance.now() - t0);
       }

       w.dealloc(ptr, totalBytes);
       worker.terminate();
       URL.revokeObjectURL(url);

       return { times };
     }

     /* ════════════════════════════════════════════════════════
        Benchmark: parcel CVs (direct, synchronous)
        ════════════════════════════════════════════════════════ */

     function benchParcelCvs(w, parcelBytes, numParcels, iters, measurements) {
       const inPtr  = w.alloc(parcelBytes);
       const outPtr = w.alloc(CV_LEN);
       const heap   = new Uint8Array(w.memory.buffer);
       fillDeterministic(heap, inPtr, parcelBytes);

       const PARCEL_BIG = BigInt(parcelBytes);

       const times = [];
       for (let j = 0; j < measurements; j++) {
         const t0 = performance.now();
         for (let i = 0; i < iters; i++) {
           let off = 0n;
           for (let p = 0; p < numParcels; p++) {
             w.hashParcel(inPtr, parcelBytes, off, outPtr);
             off += PARCEL_BIG;
           }
         }
         times.push(performance.now() - t0);
       }

       const lastCv = new Uint8Array(w.memory.buffer, outPtr, CV_LEN).slice();
       w.dealloc(outPtr, CV_LEN);
       w.dealloc(inPtr, parcelBytes);
       return { times, lastCv };
     }

     /* ════════════════════════════════════════════════════════
        Benchmark: streaming worker round-trip
        ════════════════════════════════════════════════════════ */

     async function benchStreamingWorker(streamingHasher, parcelBytes, numParcels, iters, measurements) {
       const pkg = streamingHasher.pkg;

       const dataPtr = pkg.alloc(numParcels * parcelBytes);
       const cvPtr   = pkg.alloc(numParcels * CV_LEN);

       const heap = new Uint8Array(streamingHasher.memory.buffer);
       for (let i = 0; i < numParcels * parcelBytes; i++) {
         heap[dataPtr + i] = i & 0xff;
       }

       const PARCEL_BIG = BigInt(parcelBytes);
       const times = [];
       for (let j = 0; j < measurements; j++) {
         const t0 = performance.now();
         for (let it = 0; it < iters; it++) {
           const promises = [];
           for (let p = 0; p < numParcels; p++) {
             const pDataPtr = dataPtr + p * parcelBytes;
             const pCvPtr   = cvPtr + p * CV_LEN;
             const offset   = BigInt(p) * PARCEL_BIG;
             promises.push(streamingHasher.dispatchHash(pDataPtr, parcelBytes, offset, pCvPtr));
           }
           await Promise.all(promises);
         }
         times.push(performance.now() - t0);
       }

       const lastCv = new Uint8Array(
         streamingHasher.memory.buffer,
         cvPtr + (numParcels - 1) * CV_LEN,
         CV_LEN
       ).slice();

       pkg.dealloc(cvPtr, numParcels * CV_LEN);
       pkg.dealloc(dataPtr, numParcels * parcelBytes);

       return { times, lastCv };
     }

     /* ── correctness check ─────────────────────────────────── */

     function correctnessCheckDirect(parcelBytes) {
       function hashOne(w, offset) {
         const inPtr  = w.alloc(parcelBytes);
         const outPtr = w.alloc(CV_LEN);
         const heap   = new Uint8Array(w.memory.buffer);
         fillDeterministic(heap, inPtr, parcelBytes);
         w.hashParcel(inPtr, parcelBytes, offset, outPtr);
         const cv = new Uint8Array(w.memory.buffer, outPtr, CV_LEN).slice();
         w.dealloc(outPtr, CV_LEN);
         w.dealloc(inPtr, parcelBytes);
         return cv;
       }

       const myCv0  = hashOne(my,  0n);
       const hisCv0 = hashOne(his, 0n);
       const match  = myCv0.every((v, i) => v === hisCv0[i]);

       log(`Correctness — direct (parcel size=${parcelBytes}, offset=0):`);
       log(`  mine: ${hex(myCv0)}`);
       log(`  his:  ${hex(hisCv0)}`);
       log(`  ${match ? '✅ MATCH' : '❌ MISMATCH'}`);

       return { myCv0, match };
     }

     async function correctnessCheckStreaming(streamingHasher, parcelBytes) {
       const pkg = streamingHasher.pkg;
       const mem = streamingHasher.memory;

       const dataPtr = pkg.alloc(parcelBytes);
       const cvPtr   = pkg.alloc(CV_LEN);

       const heap = new Uint8Array(mem.buffer);
       for (let i = 0; i < parcelBytes; i++) heap[dataPtr + i] = i & 0xff;

       await streamingHasher.dispatchHash(dataPtr, parcelBytes, 0n, cvPtr);

       const streamingCv = new Uint8Array(mem.buffer, cvPtr, CV_LEN).slice();

       const refCvPtr = pkg.alloc(CV_LEN);
       pkg.hash_64k_parcel_to_cv_from_ptr(dataPtr, parcelBytes, 0n, refCvPtr);
       const refCv = new Uint8Array(mem.buffer, refCvPtr, CV_LEN).slice();

       pkg.dealloc(refCvPtr, CV_LEN);
       pkg.dealloc(cvPtr, CV_LEN);
       pkg.dealloc(dataPtr, parcelBytes);

       const match = streamingCv.every((v, i) => v === refCv[i]);
       log(`Correctness — streaming (parcel size=${parcelBytes}):`);
       log(`  streaming: ${hex(streamingCv)}`);
       log(`  direct:    ${hex(refCv)}`);
       log(`  ${match ? '✅ MATCH' : '❌ MISMATCH'}`);
       if (!match) throw new Error('streaming CV mismatch');
     }

     /* ── render helpers ────────────────────────────────────── */

     function formatRate(ms, iters, numParcels, parcelBytes) {
       // MB/s throughput
       const totalBytes = iters * numParcels * parcelBytes;
       const seconds = ms / 1000;
       if (seconds <= 0) return '∞';
       const mbps = (totalBytes / 1e6) / seconds;
       return mbps.toFixed(1);
     }

     function renderSimpleTable(title, headers, rows) {
       let html = `<h3>${title}</h3><table><tr>`;
       for (const h of headers) html += `<th>${h}</th>`;
       html += '</tr>';
       for (const row of rows) {
         html += '<tr>';
         for (let i = 0; i < row.length; i++) {
           const cls = i === 0 ? ' class="label"' : '';
           html += `<td${cls}>${row[i]}</td>`;
         }
         html += '</tr>';
       }
       html += '</table>';
       return html;
     }

     function renderMatrix(title, colHeaders, rowHeaders, data, fmt) {
       // data[row][col] = value
       // fmt(value) -> { text, cls }
       let html = `<h3>${title}</h3><table><tr><th></th>`;
       for (const ch of colHeaders) html += `<th>${ch}</th>`;
       html += '</tr>';

       for (let r = 0; r < rowHeaders.length; r++) {
         html += `<tr><td class="label">${rowHeaders[r]}</td>`;
         // Find best in row for highlighting
         let bestVal = Infinity;
         for (let c = 0; c < colHeaders.length; c++) {
           const v = data[r][c];
           if (v !== null && v < bestVal) bestVal = v;
         }
         for (let c = 0; c < colHeaders.length; c++) {
           const v = data[r][c];
           const { text, cls } = fmt(v, bestVal);
           html += `<td class="${cls}">${text}</td>`;
         }
         html += '</tr>';
       }
       html += '</table>';
       return html;
     }

     /* ════════════════════════════════════════════════════════
        Main
        ════════════════════════════════════════════════════════ */

     async function runAll(quick = false) {
       $btn.disabled = true;
       $btnQuick.disabled = true;
       clearLog();

       const MEAS = autoMeasurements(quick);
       const totalSteps =
         PARCEL_SIZES.length * 2 +                    // poke_only (mine + his)
         PARCEL_SIZES.length * 2 +                    // poke_and_deliver (mine + his)
         PARCEL_SIZES.length * 2 +                    // direct CVs (mine + his)
         PARCEL_SIZES.length * THREAD_COUNTS.length;  // streaming
       let step = 0;

       function progress(label) {
         step++;
         setProgress(`[${step}/${totalSteps}] ${label}`);
       }

       try {
         log('Loading modules…\n');

         // Initialize streaming with default thread count to get "my" wrapper
         const defaultSH = await getStreamingHasher(THREAD_COUNTS[0]);
         await loadHis();

         // ── Correctness checks ──────────────────────────────
         log('=== Correctness Checks ===');
         correctnessCheckDirect(65536);
         correctnessCheckDirect(1024);
         await correctnessCheckStreaming(defaultSH, 65536);
         await correctnessCheckStreaming(defaultSH, 1024);
         log('');

         let html = '';

         // Allow UI to breathe
         await new Promise(r => setTimeout(r, 20));

         // ════════════════════════════════════════════════════
         // 1. poke_only — across parcel sizes
         // ════════════════════════════════════════════════════
         {
           log('=== poke_only (JS writes into WASM memory) ===');
           const rows = [];
           for (const ps of PARCEL_SIZES) {
             const iters = autoIters(ps.bytes, NUM_PARCELS, quick);
             progress(`poke_only mine ${ps.label}`);
             const myTimes  = benchPokeOnly(my,  ps.bytes, NUM_PARCELS, iters, MEAS);
             progress(`poke_only his ${ps.label}`);
             const hisTimes = benchPokeOnly(his, ps.bytes, NUM_PARCELS, iters, MEAS);

             const myMed  = median(myTimes);
             const hisMed = median(hisTimes);

             rows.push([
               ps.label,
               iters,
               (myMed / iters).toFixed(3),
               formatRate(myMed, iters, NUM_PARCELS, ps.bytes),
               (hisMed / iters).toFixed(3),
               formatRate(hisMed, iters, NUM_PARCELS, ps.bytes),
             ]);

             log(`  ${ps.label}: mine=${(myMed/iters).toFixed(3)} ms/iter  his=${(hisMed/iters).toFixed(3)} ms/iter`);
             await new Promise(r => setTimeout(r, 5));
           }

           html += renderSimpleTable(
             `poke_only — ${NUM_PARCELS} parcels per iter`,
             ['Parcel Size', 'Iters', 'Mine ms/iter', 'Mine MB/s', 'His ms/iter', 'His MB/s'],
             rows
           );
         }

         await new Promise(r => setTimeout(r, 20));

         // ════════════════════════════════════════════════════
         // 2. poke_and_deliver — across parcel sizes
         // ════════════════════════════════════════════════════
         {
           log('\n=== poke_and_deliver (write + send to worker) ===');
           const rows = [];
           for (const ps of PARCEL_SIZES) {
             // Fewer iters since this is async and slow
             const iters = Math.max(1, Math.min(quick ? 2 : 5, autoIters(ps.bytes, NUM_PARCELS, quick)));
             progress(`poke_deliver mine ${ps.label}`);
             const myR  = await benchPokeAndDeliver(my,  ps.bytes, NUM_PARCELS, iters, MEAS);
             progress(`poke_deliver his ${ps.label}`);
             const hisR = await benchPokeAndDeliver(his, ps.bytes, NUM_PARCELS, iters, MEAS);

             const myMed  = median(myR.times);
             const hisMed = median(hisR.times);

             rows.push([
               ps.label,
               iters,
               (myMed / iters).toFixed(3),
               formatRate(myMed, iters, NUM_PARCELS, ps.bytes),
               (hisMed / iters).toFixed(3),
               formatRate(hisMed, iters, NUM_PARCELS, ps.bytes),
             ]);

             log(`  ${ps.label}: mine(SAB)=${(myMed/iters).toFixed(3)} ms  his(AB)=${(hisMed/iters).toFixed(3)} ms`);
             await new Promise(r => setTimeout(r, 5));
           }

           html += renderSimpleTable(
             `poke_and_deliver — ${NUM_PARCELS} parcels per iter`,
             ['Parcel Size', 'Iters', 'Mine (SAB) ms/iter', 'Mine MB/s', 'His (AB+xfer) ms/iter', 'His MB/s'],
             rows
           );
         }

         await new Promise(r => setTimeout(r, 20));

         // ════════════════════════════════════════════════════
         // 3. direct parcel CVs — across parcel sizes
         // ════════════════════════════════════════════════════
         {
           log('\n=== parcel_cvs direct (synchronous hashing) ===');
           const rows = [];
           for (const ps of PARCEL_SIZES) {
             const iters = autoIters(ps.bytes, NUM_PARCELS, quick);
             progress(`direct mine ${ps.label}`);
             const myR  = benchParcelCvs(my,  ps.bytes, NUM_PARCELS, iters, MEAS);
             progress(`direct his ${ps.label}`);
             const hisR = benchParcelCvs(his, ps.bytes, NUM_PARCELS, iters, MEAS);

             const myMed  = median(myR.times);
             const hisMed = median(hisR.times);

             rows.push([
               ps.label,
               iters,
               (myMed / iters).toFixed(3),
               formatRate(myMed, iters, NUM_PARCELS, ps.bytes),
               hex(myR.lastCv, 4) + '…',
               (hisMed / iters).toFixed(3),
               formatRate(hisMed, iters, NUM_PARCELS, ps.bytes),
               hex(hisR.lastCv, 4) + '…',
             ]);

             log(`  ${ps.label}: mine=${(myMed/iters).toFixed(3)} ms/iter  his=${(hisMed/iters).toFixed(3)} ms/iter`);
             await new Promise(r => setTimeout(r, 5));
           }

           html += renderSimpleTable(
             `parcel_cvs direct — ${NUM_PARCELS} parcels per iter`,
             ['Parcel Size', 'Iters', 'Mine ms/iter', 'Mine MB/s', 'Mine CV', 'His ms/iter', 'His MB/s', 'His CV'],
             rows
           );
         }

         await new Promise(r => setTimeout(r, 20));

         // ════════════════════════════════════════════════════
         // 4. Streaming — 2D matrix: parcel size × thread count
         //    Values shown: MB/s throughput
         // ════════════════════════════════════════════════════
         {
           log('\n=== streaming worker — 2D sweep (parcel size × threads) ===');

           // data[parcelIdx][threadIdx] = { mbps, medMs, iters }
           const mbpsData = [];
           const msData = [];
           const speedupData = [];

           // We also need direct (single-thread) baseline per parcel size
           const directBaseline = []; // ms/iter per parcel size

           log('  Computing direct baselines…');
           for (let pi = 0; pi < PARCEL_SIZES.length; pi++) {
             const ps = PARCEL_SIZES[pi];
             const iters = autoIters(ps.bytes, NUM_PARCELS, quick);
             const r = benchParcelCvs(my, ps.bytes, NUM_PARCELS, iters, MEAS);
             const medMs = median(r.times) / iters;
             directBaseline.push(medMs);
             log(`    ${ps.label} direct baseline: ${medMs.toFixed(3)} ms/iter`);
           }

           for (let pi = 0; pi < PARCEL_SIZES.length; pi++) {
             mbpsData.push([]);
             msData.push([]);
             speedupData.push([]);
           }

           for (let ti = 0; ti < THREAD_COUNTS.length; ti++) {
             const tc = THREAD_COUNTS[ti];
             log(`\n  Threads=${tc}:`);

             // Re-initialize streaming hasher with this thread count
             const sh = await getStreamingHasher(tc);
             await new Promise(r => setTimeout(r, 50)); // let workers settle

             for (let pi = 0; pi < PARCEL_SIZES.length; pi++) {
               const ps = PARCEL_SIZES[pi];
               const iters = autoIters(ps.bytes, NUM_PARCELS, quick);

               progress(`streaming ${ps.label} × ${tc}T`);

               const r = await benchStreamingWorker(sh, ps.bytes, NUM_PARCELS, iters, MEAS);
               const medMs = median(r.times) / iters;
               const totalBytes = NUM_PARCELS * ps.bytes;
               const mbps = (totalBytes / 1e6) / (medMs / 1000);
               const speedup = directBaseline[pi] / medMs;

               mbpsData[pi].push(mbps);
               msData[pi].push(medMs);
               speedupData[pi].push(speedup);

               log(`    ${ps.label}: ${medMs.toFixed(3)} ms/iter  ${mbps.toFixed(1)} MB/s  ${speedup.toFixed(2)}x`);
               await new Promise(r => setTimeout(r, 5));
             }
           }

           // Render MB/s matrix
           const threadLabels = THREAD_COUNTS.map(t => `${t}T`);
           const parcelLabels = PARCEL_SIZES.map(p => p.label);

           html += renderMatrix(
             `Streaming throughput (MB/s) — ${NUM_PARCELS} parcels per iter`,
             threadLabels,
             parcelLabels,
             mbpsData,
             (v, best) => {
               if (v === null) return { text: '—', cls: '' };
               const isBest = Math.abs(v - best) < 0.01 || (best > 0 && v / best > 0.99);
               // For MB/s, higher is better — so "best" is max, not min
               // Fix: we need to find the max in the row
               return { text: v.toFixed(1), cls: '' };
             }
           );

           // Re-render MB/s matrix with proper best = max logic
           html = html.replace(/<h3>Streaming throughput[^]*?<\/table>/, '');
           {
             let matHtml = `<h3>Streaming throughput (MB/s) — ${NUM_PARCELS} parcels per iter</h3><table><tr><th>Parcel \\ Threads</th>`;
             for (const tl of threadLabels) matHtml += `<th>${tl}</th>`;
             matHtml += '<th>Direct (1T)</th></tr>';

             for (let r = 0; r < parcelLabels.length; r++) {
               matHtml += `<tr><td class="label">${parcelLabels[r]}</td>`;
               let bestMbps = 0;
               for (let c = 0; c < threadLabels.length; c++) {
                 if (mbpsData[r][c] > bestMbps) bestMbps = mbpsData[r][c];
               }
               for (let c = 0; c < threadLabels.length; c++) {
                 const v = mbpsData[r][c];
                 const isBest = v >= bestMbps * 0.99;
                 matHtml += `<td class="${isBest ? 'best' : ''}">${v.toFixed(1)}</td>`;
               }
               // Direct baseline column
               const directMbps = (NUM_PARCELS * PARCEL_SIZES[r].bytes / 1e6) / (directBaseline[r] / 1000);
               matHtml += `<td>${directMbps.toFixed(1)}</td>`;
               matHtml += '</tr>';
             }
             matHtml += '</table>';
             html += matHtml;
           }

           // Speedup matrix
           {
             let matHtml = `<h3>Streaming speedup vs. direct (×) — ${NUM_PARCELS} parcels</h3><table><tr><th>Parcel \\ Threads</th>`;
             for (const tl of threadLabels) matHtml += `<th>${tl}</th>`;
             matHtml += '</tr>';

             for (let r = 0; r < parcelLabels.length; r++) {
               matHtml += `<tr><td class="label">${parcelLabels[r]}</td>`;
               let bestSpeedup = 0;
               for (let c = 0; c < threadLabels.length; c++) {
                 if (speedupData[r][c] > bestSpeedup) bestSpeedup = speedupData[r][c];
               }
               for (let c = 0; c < threadLabels.length; c++) {
                 const v = speedupData[r][c];
                 const isBest = v >= bestSpeedup * 0.99;
                 const cls = v >= 1.0 ? (isBest ? 'best fast' : 'fast') : 'slow';
                 matHtml += `<td class="${cls}">${v.toFixed(2)}×</td>`;
               }
               matHtml += '</tr>';
             }
             matHtml += '</table>';
             html += matHtml;
           }

           // ms/iter matrix
           {
             let matHtml = `<h3>Streaming latency (ms/iter) — ${NUM_PARCELS} parcels</h3><table><tr><th>Parcel \\ Threads</th>`;
             for (const tl of threadLabels) matHtml += `<th>${tl}</th>`;
             matHtml += '<th>Direct (1T)</th></tr>';

             for (let r = 0; r < parcelLabels.length; r++) {
               matHtml += `<tr><td class="label">${parcelLabels[r]}</td>`;
               let bestMs = Infinity;
               for (let c = 0; c < threadLabels.length; c++) {
                 if (msData[r][c] < bestMs) bestMs = msData[r][c];
               }
               for (let c = 0; c < threadLabels.length; c++) {
                 const v = msData[r][c];
                 const isBest = v <= bestMs * 1.01;
                 matHtml += `<td class="${isBest ? 'best' : ''}">${v.toFixed(3)}</td>`;
               }
               matHtml += `<td>${directBaseline[r].toFixed(3)}</td>`;
               matHtml += '</tr>';
             }
             matHtml += '</table>';
             html += matHtml;
           }
         }

         $results.innerHTML = html;
         setProgress('Done!');
         log('\n✅ All benchmarks complete.');

       } catch (e) {
         if (e instanceof Event) {
           log(`ERROR: Worker event — check console for details (script 404?)`);
         } else {
           log(`ERROR: ${e}\n${e.stack || ''}`);
         }
         setProgress('Error — see log');
       } finally {
         $btn.disabled = false;
         $btnQuick.disabled = false;
         // Clean up streaming hasher
         if (currentStreaming) {
           currentStreaming.terminate();
           currentStreaming = null;
           currentThreadCount = 0;
         }
       }
     }

     window.runAll = runAll;
    </script>
  </body>
</html>
