<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>BLAKE3 WASM — Hash Demo</title>
  </head>
  <body>
    <pre id="out">Loading…</pre>
    <script src="coi-serviceworker.min.js"></script>
    <script type="module">
     import init from '../multithreading-hasher.js';
     const h = await init();

     const smallInput = 'abcdefghihjl';
     const largeInput = 'abcdefghihjl'.repeat(20000);

     const smallDirect = h.hash(smallInput);
     const smallParallel = await h.hashParallel(smallInput);

     const largeDirect = h.hash(largeInput);
     const largeParallel = await h.hashParallel(largeInput);

     document.getElementById('out').textContent =
       `small input: ${smallInput}\n` +
       `small direct:   ${smallDirect}\n` +
       `small parallel: ${smallParallel}\n\n` +
       `large input length: ${largeInput.length} bytes\n` +
       `large direct:   ${largeDirect}\n` +
       `large parallel: ${largeParallel}\n`;
    </script>
  </body>
</html>
