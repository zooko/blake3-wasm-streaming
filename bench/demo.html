<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>BLAKE3 WASM — Hash Demo</title>
  </head>
  <body>
    <pre id="out">Loading…</pre>
    <script src="coi-serviceworker.min.js"></script>
    <script type="module">
     import init from '../multithreading-hasher.js';

     const enc = new TextEncoder();
     const h = await init();

     const smallText = 'abcdefghihjl';
     const largeText = 'abcdefghihjl'.repeat(20000);

     const smallDirect = h.hashBytes(enc.encode(smallText));
     const smallParallel = await h.hashParallelBytes(enc.encode(smallText));

     const largeDirect = h.hashBytes(enc.encode(largeText));
     const largeParallel = await h.hashParallelBytes(enc.encode(largeText));

     document.getElementById('out').textContent =
       `small input: ${smallText}\n` +
       `small direct:   ${smallDirect}\n` +
       `small parallel: ${smallParallel}\n` +
       `large input length: ${largeText.length} bytes\n` +
       `large direct:   ${largeDirect}\n` +
       `large parallel: ${largeParallel}\n`
    </script>
  </body>
</html>
