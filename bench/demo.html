<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>BLAKE3 WASM — Hash Demo</title>
  </head>
  <body>
    <pre id="out">Loading…</pre>
    <script src="coi-serviceworker.min.js"></script>
    <script type="module">
     import init from '../multithreading-hasher.js';

     const HEX = Array.from({ length: 256 },
       (_, i) => (i + 256).toString(16).slice(1));

     function hex(bytes) {
       let s = '';
       for (let i = 0; i < bytes.length; i++)
         s += HEX[bytes[i]];
       return s;
     }

     const enc = new TextEncoder();
     const h = await init();

     const smallText = 'abcdefghihjl';
     const largeText = 'abcdefghihjl'.repeat(20000);

     h.hashBytes(enc.encode(smallText));
     const smallDirect = hex(h.digest);

     const smallT =
       await h.hashParallelBytes(enc.encode(smallText));
     const smallParallel = hex(h.digest);

     h.hashBytes(enc.encode(largeText));
     const largeDirect = hex(h.digest);

     const largeT =
       await h.hashParallelBytes(enc.encode(largeText));
     const largeParallel = hex(h.digest);

     document.getElementById('out').textContent =
       `small input: ${smallText}\n` +
       `small direct:   ${smallDirect}\n` +
       `small parallel: ${smallParallel} (${smallT}T)\n\n` +
       `large input length: ${largeText.length} bytes\n` +
       `large direct:   ${largeDirect}\n` +
       `large parallel: ${largeParallel} (${largeT}T)\n`;
    </script>
  </body>
</html>
